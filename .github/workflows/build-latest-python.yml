name: Build ONNX Runtime for Latest Python

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        python-version: ['3.13', '3.12', '3.11']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        # Install Homebrew if not already installed
        if ! command -v brew &> /dev/null; then
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        fi

        # Add Homebrew to PATH
        echo "$(brew --prefix)/bin" >> $GITHUB_PATH

        # Install CMake and other dependencies
        brew install cmake protobuf

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install numpy pybind11

    - name: Configure build
      run: |
        # Clean any existing build
        rm -rf build/

        # Run CMake configuration with DEBUG_NODE_INPUTS_OUTPUTS enabled
        ./build.sh --config RelWithDebInfo --update --cmake_extra_defines onnxruntime_DEBUG_NODE_INPUTS_OUTPUTS=1

    - name: Build ONNX Runtime
      run: |
        # Build the project
        ./build.sh --config RelWithDebInfo --build --build_wheel --parallel --skip_tests --cmake_extra_defines onnxruntime_DEBUG_NODE_INPUTS_OUTPUTS=1

    - name: Verify wheel
      run: |
        # Check the wheel was created
        ls -la dist/

        # Verify Python version in wheel name matches expected version
        python -c "
        import os
        import glob
        import sys
        wheels = glob.glob('dist/*.whl')
        if wheels:
            wheel_name = os.path.basename(wheels[0])
            print(f'Built wheel: {wheel_name}')

            # Extract Python version from wheel name
            import re
            match = re.search(r'cp(\d+)-cp(\d+)', wheel_name)
            if match:
                wheel_python_version = f'{match.group(1)[0]}.{match.group(1)[1:]}'
                expected_version = f'{sys.version_info.major}.{sys.version_info.minor}'
                print(f'Wheel built for Python: {wheel_python_version}')
                print(f'Expected Python version: {expected_version}')

                if wheel_python_version != expected_version:
                    print(f'ERROR: Wheel Python version mismatch!')
                    exit(1)
                else:
                    print('✓ Python version matches expected version')
            else:
                print('Could not determine Python version from wheel name')
                exit(1)
        else:
            print('No wheel found!')
            exit(1)
        "

    - name: Test wheel installation
      run: |
        # Test installing the wheel
        pip install dist/*.whl --force-reinstall

        # Test basic functionality
        python -c "
        import onnxruntime as ort
        print(f'ONNX Runtime version: {ort.__version__}')
        print(f'Available providers: {ort.get_available_providers()}')
        print(f'Device: {ort.get_device()}')
        print('✓ ONNX Runtime is working correctly')
        "

    - name: Upload wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: onnxruntime-wheel-python${{ matrix.python-version }}
        path: dist/*.whl
        retention-days: 30
