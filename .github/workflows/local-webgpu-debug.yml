name: local-webgpu-debug

on:
  workflow_dispatch:

jobs:
  build-webgpu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build prerequisites
        shell: bash
        run: |
          python -m pip install --upgrade pip

      - name: Install Emscripten SDK
        shell: bash
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          pushd emsdk
          ./emsdk install 3.1.56
          ./emsdk activate 3.1.56
          echo "EMSDK_PATH=${PWD}" >> $GITHUB_ENV
          popd

      - name: Build ONNX Runtime WebGPU (Debug)
        shell: bash
        run: |
          source "$EMSDK_PATH/emsdk_env.sh"
          ./build.sh \
            --config Debug \
            --build_wasm \
            --enable_wasm_profiling \
            --use_webgpu \
            --cmake_extra_defines "onnxruntime_BUILD_UNIT_TESTS=OFF" \
            --target onnxruntime_webassembly \
            --skip_tests \
            --parallel

      - name: Collect Web artifacts
        shell: bash
        run: |
          mkdir -p web_artifacts
          cp -R js/web/dist web_artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ort-webgpu-debug
          path: web_artifacts
